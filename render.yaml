services:
  - type: web
    name: elaya-smiles
    env: docker
    # 'starter' (512 MB) es suficiente para rdkit + openbabel con lazy imports.
    # Si usas GLOMOS o Auto3D frecuentemente, cambia a 'standard' (2 GB).
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api
