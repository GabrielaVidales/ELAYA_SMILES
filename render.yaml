services:
  - type: web
    name: elaya-smiles
    env: docker
    # Free plan has 512 MB RAM — upgrade to 'starter' (2 GB) for GLOMOS/TorchANI
    plan: starter
    dockerfilePath: ./Dockerfile
    # Render sets PORT env var; app.py reads it via the environment
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api
